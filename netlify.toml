[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24.16.0"

[functions]
  node_bundler = "esbuild"
  external_node_modules = []

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
